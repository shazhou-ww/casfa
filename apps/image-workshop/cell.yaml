name: image-workshop
bucketNameSuffix: casfa-shazhou-me

backend:
  dir: backend
  runtime: nodejs20.x
  entries:
    mcp:
      handler: lambda.ts
      app: dev-app.ts
      timeout: 90
      memory: 1024
      routes:
        - /api/*
        - /oauth/login
        - /oauth/logout
        - /oauth/register
        - /oauth/client-info
        - /oauth/token
        - /.well-known/*
        - /mcp

frontend:
  dir: frontend
  entries:
    main:
      entry: index.html
      routes: ["/*"]

# Cognito and domain config come from .env (root or cell-level) for easy instance switching.
# SSO: only REGION + USER_POOL_ID needed for JWT (rest on SSO cell).
params:
  COGNITO_REGION: !Env
  COGNITO_USER_POOL_ID: !Env
  DOMAIN_ZONE: !Env
  DOMAIN_HOST: !Env
  LOG_LEVEL: !Env
  SSO_BASE_URL: !Env
  BFL_API_KEY: !Secret

tables:
  grants:
    keys:
      pk: S
      sk: S
    gsi:
      user-hash-index:
        keys:
          gsi1pk: S
          gsi1sk: S
        projection: ALL
      user-refresh-index:
        keys:
          gsi2pk: S
          gsi2sk: S
        projection: ALL
  pending_client_info:
    keys: { pk: S }

domain:
  zone: !Param DOMAIN_ZONE
  host: !Param DOMAIN_HOST

testing:
  unit: backend/
