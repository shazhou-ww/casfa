name: image-workshop

backend:
  runtime: nodejs20.x
  entries:
    mcp:
      handler: src/lambda.ts
      timeout: 90
      memory: 1024
      routes: ["*"]

frontend:
  dir: frontend
  entries:
    main:
      src: src/main.tsx

static: []

tables: {}

buckets: {}

params:
  COGNITO_REGION: us-east-1
  COGNITO_USER_POOL_ID: us-east-1_gMTKxXOKo
  COGNITO_CLIENT_ID: rrr40170csj0160ptr9lusi3k
  COGNITO_HOSTED_UI_URL: https://casfa-auth.auth.us-east-1.amazoncognito.com
  ACM_CERTIFICATE_ARN: ""
  COGNITO_CLIENT_SECRET: !Secret
  BFL_API_KEY: !Secret

cognito:
  region: !Param COGNITO_REGION
  userPoolId: !Param COGNITO_USER_POOL_ID
  clientId: !Param COGNITO_CLIENT_ID
  hostedUiUrl: !Param COGNITO_HOSTED_UI_URL
  clientSecret: !Param COGNITO_CLIENT_SECRET

domain:
  zone: shazhou.me
  host: image-workshop.casfa.shazhou.me
  certificate: !Param ACM_CERTIFICATE_ARN

testing:
  unit: "**/__tests__/*.test.ts"
  e2e: "tests/*.test.ts"
