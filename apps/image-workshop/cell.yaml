name: image-workshop

backend:
  dir: backend
  runtime: nodejs20.x
  entries:
    mcp:
      handler: lambda.ts
      timeout: 90
      memory: 1024
      routes:
        - /api/*
        - /oauth/authorize
        - /oauth/token
        - /oauth/register
        - /oauth/callback
        - /oauth/consent-info
        - /oauth/approve
        - /oauth/deny
        - /oauth/logout
        - /.well-known/*
        - /mcp

frontend:
  dir: frontend
  entries:
    main:
      entry: index.html
      routes: ["/*"]

params:
  COGNITO_REGION: !Env
  COGNITO_USER_POOL_ID: !Env
  COGNITO_CLIENT_ID: !Env
  COGNITO_HOSTED_UI_URL: !Env
  GOOGLE_CLIENT_ID: !Env
  GOOGLE_CLIENT_SECRET: !Secret
  MICROSOFT_CLIENT_ID: !Env
  MICROSOFT_CLIENT_SECRET: !Secret
  BFL_API_KEY: !Secret

tables:
  grants:
    keys:
      pk: S
      sk: S
    gsi:
      user-hash-index:
        keys:
          gsi1pk: S
          gsi1sk: S
        projection: ALL
      user-refresh-index:
        keys:
          gsi2pk: S
          gsi2sk: S
        projection: ALL

cognito:
  region: !Param COGNITO_REGION
  userPoolId: !Param COGNITO_USER_POOL_ID
  clientId: !Param COGNITO_CLIENT_ID
  hostedUiUrl: !Param COGNITO_HOSTED_UI_URL

domain:
  zone: shazhou.me
  host: image-workshop.casfa.shazhou.me

testing:
  unit: backend/
