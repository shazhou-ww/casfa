name: image-workshop
bucketNameSuffix: casfa-shazhou-me

backend:
  dir: backend
  runtime: nodejs20.x
  entries:
    mcp:
      handler: lambda.ts
      app: dev-app.ts
      timeout: 90
      memory: 1024
      routes:
        - /api/*
        - /oauth/login
        - /oauth/logout
        - /oauth/register
        - /oauth/client-info
        - /oauth/token
        - /.well-known/*
        - /mcp

frontend:
  dir: frontend
  entries:
    main:
      entry: index.html
      routes: ["/*"]

# Default instance: casfa.shazhou.me (Route53). Symbiont: cell.symbiont.yaml.
params:
  COGNITO_REGION: "us-east-1"
  COGNITO_USER_POOL_ID: "us-east-1_gMTKxXOKo"
  DOMAIN_ROOT: "shazhou.me"
  DNS:
    provider: route53
    zone: "casfa.shazhou.me"
  LOG_LEVEL: "info"
  SSO_BASE_URL: !Env SSO_BASE_URL
  BFL_API_KEY: !Secret

tables:
  grants:
    keys:
      pk: S
      sk: S
    gsi:
      user-hash-index:
        keys:
          gsi1pk: S
          gsi1sk: S
        projection: ALL
      user-refresh-index:
        keys:
          gsi2pk: S
          gsi2sk: S
        projection: ALL
  pending_client_info:
    keys: { pk: S }

dev:
  portBase: 7140

domain:
  subdomain: image-workshop.casfa
  dns: !Param DNS

testing:
  unit: backend/
