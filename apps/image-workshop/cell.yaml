name: image-workshop

backend:
  runtime: nodejs20.x
  entries:
    mcp:
      handler: backend/lambda.ts
      timeout: 90
      memory: 1024
      routes:
        - /api/*
        - /oauth/authorize
        - /oauth/token
        - /oauth/register
        - /oauth/callback
        - /oauth/consent-info
        - /oauth/approve
        - /oauth/deny
        - /.well-known/*
        - /mcp

frontend:
  dir: frontend
  entries:
    main:
      src: main.tsx

params:
  COGNITO_REGION: us-east-1
  COGNITO_USER_POOL_ID: us-east-1_gMTKxXOKo
  COGNITO_CLIENT_ID: rrr40170csj0160ptr9lusi3k
  COGNITO_HOSTED_UI_URL: https://casfa-auth.auth.us-east-1.amazoncognito.com
  GOOGLE_CLIENT_ID: 1084492958564-ngqgsjbss5ta8676oa101rrg9prcankv.apps.googleusercontent.com
  GOOGLE_CLIENT_SECRET: !Secret
  MICROSOFT_CLIENT_ID: 38da332e-7a20-4765-acae-c249e74c6a6a
  MICROSOFT_CLIENT_SECRET: !Secret
  BFL_API_KEY: !Secret

tables:
  grants:
    keys:
      pk: S
      sk: S
    gsi:
      user-hash-index:
        keys:
          gsi1pk: S
          gsi1sk: S
        projection: ALL
      user-refresh-index:
        keys:
          gsi2pk: S
          gsi2sk: S
        projection: ALL

cognito:
  region: !Param COGNITO_REGION
  userPoolId: !Param COGNITO_USER_POOL_ID
  clientId: !Param COGNITO_CLIENT_ID
  hostedUiUrl: !Param COGNITO_HOSTED_UI_URL

domain:
  zone: shazhou.me
  host: image-workshop.casfa.shazhou.me
