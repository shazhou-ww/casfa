name: image-workshop

backend:
  dir: backend
  runtime: nodejs20.x
  entries:
    mcp:
      handler: lambda.ts
      timeout: 90
      memory: 1024
      routes:
        - /api/*
        - /oauth/login
        - /oauth/logout
        - /oauth/register
        - /oauth/token
        - /.well-known/*
        - /mcp

frontend:
  dir: frontend
  entries:
    main:
      entry: index.html
      routes: ["/*"]

# Per docs/cell-config-rules: literal = non-secret & same local/prod; !Env/!Secret = secret or env-specific.
# SSO: only REGION + USER_POOL_ID needed for JWT (rest on SSO cell).
params:
  COGNITO_REGION: "us-east-1"
  COGNITO_USER_POOL_ID: "us-east-1_gMTKxXOKo"
  LOG_LEVEL: !Env
  SSO_BASE_URL: !Env
  BFL_API_KEY: !Secret

tables:
  grants:
    keys:
      pk: S
      sk: S
    gsi:
      user-hash-index:
        keys:
          gsi1pk: S
          gsi1sk: S
        projection: ALL
      user-refresh-index:
        keys:
          gsi2pk: S
          gsi2sk: S
        projection: ALL
  pending_client_info:
    keys: { pk: S }

domain:
  zone: shazhou.me
  host: image-workshop.casfa.shazhou.me

testing:
  unit: backend/
