# Symbiont instance: sso.symbiontlabs.me, Cognito mitsein-auth, Cloudflare DNS.
# Deploy: cell deploy -i symbiont
# Set CLOUDFLARE_API_TOKEN_SYMBIONT in .env when deploying (renamed to avoid overriding devbox prepare).
params:
  DOMAIN_ROOT: "symbiontlabs.me"
  SUBDOMAIN: "sso"
  AUTH_COOKIE_DOMAIN: ".symbiontlabs.me"
  COGNITO_REGION: "us-east-1"
  COGNITO_USER_POOL_ID: "us-east-1_vgPkJO4J1"
  COGNITO_CLIENT_ID: "1f4fanik5nrd1s453acvn6nqgk"
  COGNITO_HOSTED_UI_URL: "https://mitsein-auth.auth.us-east-1.amazoncognito.com"
  DNS:
    provider: cloudflare
    zoneId: "977caaf5ca4e44095ddc837213633597"
    apiToken: !Secret CLOUDFLARE_API_TOKEN
  # Resolve CLOUDFLARE_API_TOKEN from env CLOUDFLARE_API_TOKEN_SYMBIONT so devbox prepare is not overridden
  CLOUDFLARE_API_TOKEN: !Env CLOUDFLARE_API_TOKEN_SYMBIONT
