name: sso

backend:
  dir: backend
  runtime: nodejs20.x
  entries:
    api:
      handler: lambda.ts
      app: dev-app.ts
      timeout: 30
      memory: 512
      routes:
        - /oauth/authorize
        - /oauth/callback
        - /oauth/token
        - /oauth/refresh
        - /oauth/logout
        - /oauth/register
        - /.well-known/*
        - /api/health

frontend:
  dir: frontend
  entries:
    main:
      entry: index.html
      routes: ["/*"]

tables:
  grants:
    keys: { pk: S, sk: S }
    gsi:
      user-hash-index:
        keys: { gsi1pk: S, gsi1sk: S }
        projection: ALL
      user-refresh-index:
        keys: { gsi2pk: S, gsi2sk: S }
        projection: ALL

params:
  - COGNITO_REGION
  - COGNITO_USER_POOL_ID
  - COGNITO_CLIENT_ID
  - COGNITO_HOSTED_UI_URL

cognito:
  region: !Param COGNITO_REGION
  userPoolId: !Param COGNITO_USER_POOL_ID
  clientId: !Param COGNITO_CLIENT_ID
  hostedUiUrl: !Param COGNITO_HOSTED_UI_URL

testing:
  unit: backend/
