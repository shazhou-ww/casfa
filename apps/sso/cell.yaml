name: sso
bucketNameSuffix: mitsein

backend:
  dir: backend
  runtime: nodejs20.x
  entries:
    api:
      handler: lambda.ts
      app: dev-app.ts
      timeout: 30
      memory: 512
      routes:
        - /oauth/authorize
        - /oauth/callback
        - /oauth/token
        - /oauth/refresh
        - /oauth/logout
        - /oauth/register
        - /.well-known/*
        - /api/health

frontend:
  dir: frontend
  entries:
    main:
      entry: index.html
      routes: ["/*"]

tables:
  grants:
    keys: { pk: S, sk: S }
    gsi:
      user-hash-index:
        keys: { gsi1pk: S, gsi1sk: S }
        projection: ALL
      user-refresh-index:
        keys: { gsi2pk: S, gsi2sk: S }
        projection: ALL

params:
  COGNITO_REGION: !Env
  COGNITO_USER_POOL_ID: !Env
  COGNITO_CLIENT_ID: !Env
  COGNITO_HOSTED_UI_URL: !Env
  AUTH_COOKIE_NAME: auth
  AUTH_REFRESH_COOKIE_NAME: auth_refresh
  AUTH_COOKIE_DOMAIN: !Env
  AUTH_COOKIE_PATH: "/"
  AUTH_COOKIE_MAX_AGE_SECONDS: "3600"
  AUTH_REFRESH_COOKIE_PATH: "/oauth/refresh"
  AUTH_REFRESH_COOKIE_MAX_AGE_SECONDS: "2592000"
  DOMAIN_ZONE: !Env
  DOMAIN_HOST: !Env
  DNS_PROVIDER: !Env
  CLOUDFLARE_ZONE_ID: !Env
  CLOUDFLARE_API_TOKEN: !Secret
  LOG_LEVEL: !Env

cognito:
  region: !Param COGNITO_REGION
  userPoolId: !Param COGNITO_USER_POOL_ID
  clientId: !Param COGNITO_CLIENT_ID
  hostedUiUrl: !Param COGNITO_HOSTED_UI_URL

domains:
  - zone: !Param DOMAIN_ZONE
    host: !Param DOMAIN_HOST
    dns: !Param DNS_PROVIDER
    cloudflare:
      zoneId: !Param CLOUDFLARE_ZONE_ID
      apiToken: !Param CLOUDFLARE_API_TOKEN

testing:
  unit: backend/
