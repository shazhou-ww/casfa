name: sso
bucketNameSuffix: mitsein

backend:
  dir: backend
  runtime: nodejs20.x
  entries:
    api:
      handler: lambda.ts
      app: dev-app.ts
      timeout: 30
      memory: 512
      routes:
        - /oauth/authorize
        - /oauth/callback
        - /oauth/token
        - /oauth/refresh
        - /oauth/logout
        - /oauth/register
        - /.well-known/*
        - /api/health

frontend:
  dir: frontend
  entries:
    main:
      entry: index.html
      routes: ["/*"]

tables:
  grants:
    keys: { pk: S, sk: S }
    gsi:
      user-hash-index:
        keys: { gsi1pk: S, gsi1sk: S }
        projection: ALL
      user-refresh-index:
        keys: { gsi2pk: S, gsi2sk: S }
        projection: ALL

params:
  COGNITO_REGION: "us-east-1"
  COGNITO_USER_POOL_ID: "us-east-1_gMTKxXOKo"
  COGNITO_CLIENT_ID: "rrr40170csj0160ptr9lusi3k"
  COGNITO_HOSTED_UI_URL: "https://casfa-auth.auth.us-east-1.amazoncognito.com"
  AUTH_COOKIE_NAME: auth
  AUTH_REFRESH_COOKIE_NAME: auth_refresh
  AUTH_COOKIE_DOMAIN: !Env AUTH_COOKIE_DOMAIN
  AUTH_COOKIE_PATH: "/"
  AUTH_COOKIE_MAX_AGE_SECONDS: "3600"
  AUTH_REFRESH_COOKIE_PATH: "/oauth/refresh"
  AUTH_REFRESH_COOKIE_MAX_AGE_SECONDS: "2592000"
  DOMAIN_ROOT: "shazhou.me"
  DNS:
    provider: route53
    zone: "casfa.shazhou.me"
  LOG_LEVEL: "info"

cognito:
  region: !Param COGNITO_REGION
  userPoolId: !Param COGNITO_USER_POOL_ID
  clientId: !Param COGNITO_CLIENT_ID
  hostedUiUrl: !Param COGNITO_HOSTED_UI_URL

dev:
  portBase: 7100

domain:
  subdomain: sso.casfa
  dns: !Param DNS

testing:
  unit: backend/
