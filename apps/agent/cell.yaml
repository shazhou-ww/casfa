name: agent

backend:
  dir: backend
  runtime: nodejs20.x
  entries:
    api:
      handler: lambda.ts
      app: dev-app.ts
      timeout: 30
      memory: 1024
      routes:
        - /api/*
        - /oauth/login
        - /oauth/logout
        - /oauth/register
        - /oauth/client-info
        - /oauth/mcp-client-metadata
        - /oauth/token
        - /.well-known/*

frontend:
  dir: frontend
  entries:
    main:
      entry: index.html
      routes: ["/*"]
    sw:
      entry: sw.ts
      routes: ["/sw.js"]

tables:
  threads:
    keys: { pk: S, sk: S }
    gsi:
      thread-list:
        keys: { gsi1pk: S, gsi1sk: S }
        projection: ALL
  messages:
    keys: { pk: S, sk: S }
  settings:
    keys: { pk: S, sk: S }
  grants:
    keys: { pk: S, sk: S }
    gsi:
      user-hash-index:
        keys: { gsi1pk: S, gsi1sk: S }
        projection: ALL
      user-refresh-index:
        keys: { gsi2pk: S, gsi2sk: S }
        projection: ALL
  pending_client_info:
    keys: { pk: S }

# Default instance. Symbiont: cell.symbiont.yaml (optional).
params:
  - AUTH

testing:
  unit: backend/
