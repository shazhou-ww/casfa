service: casfa-next

frameworkVersion: "4"

build:
  esbuild: false

# Resources (placeholders): DynamoDB tables casfa-next-<table>, S3 bucket casfa-next-blob (shared),
# S3 bucket casfa-next-frontend-${sls:stage} per stage. DynamoDB local ports: local-dev 7102, local-test 7112.

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:BatchGetItem
            - dynamodb:BatchWriteItem
            - dynamodb:Scan
          Resource:
            - !GetAtt DelegatesTable.Arn
            - !Sub ${DelegatesTable.Arn}/index/*
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:BatchGetItem
            - dynamodb:BatchWriteItem
            - dynamodb:Scan
          Resource:
            - !GetAtt DelegateGrantsTable.Arn
            - !Sub ${DelegateGrantsTable.Arn}/index/*
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
            - s3:DeleteObject
            - s3:ListBucket
          Resource:
            - !GetAtt BlobBucket.Arn
            - !Sub ${BlobBucket.Arn}/*
  stackParameters:
    - ParameterKey: CloudFrontAlias
      ParameterValue: ${env:CLOUDFRONT_ALIAS, ''}
    - ParameterKey: AcmCertArn
      ParameterValue: ${env:ACM_CERTIFICATE_ARN, ''}
  httpApi:
    payload: '2.0'
    cors: true
  environment:
    PORT: ${env:PORT, '8802'}
    MOCK_JWT_SECRET: ${env:MOCK_JWT_SECRET, ''}
    MAX_BRANCH_TTL_MS: ${env:MAX_BRANCH_TTL_MS, ''}
    COGNITO_REGION: ${env:COGNITO_REGION, ''}
    COGNITO_USER_POOL_ID: ${env:COGNITO_USER_POOL_ID, ''}
    COGNITO_CLIENT_ID: ${env:COGNITO_CLIENT_ID, ''}
    COGNITO_HOSTED_UI_URL: ${env:COGNITO_HOSTED_UI_URL, ''}
    COGNITO_CLIENT_SECRET: ${env:COGNITO_CLIENT_SECRET, ''}
    DYNAMODB_ENDPOINT: ${env:DYNAMODB_ENDPOINT, ''}
    DYNAMODB_TABLE_DELEGATES: ${env:DYNAMODB_TABLE_DELEGATES, 'casfa-next-${sls:stage}-delegates'}
    DYNAMODB_TABLE_GRANTS: ${env:DYNAMODB_TABLE_GRANTS, 'casfa-next-${sls:stage}-grants'}
    S3_BUCKET: ${env:S3_BUCKET, 'casfa-next-${sls:stage}-blob'}
    S3_ENDPOINT: ${env:S3_ENDPOINT, ''}
    LOG_LEVEL: ${env:LOG_LEVEL, ''}

plugins:
  - serverless-dynamodb
  - serverless-s3-local
  - serverless-esbuild
  - serverless-offline
  - serverless-parameters

custom:
  # CloudFormation Parameters for custom domain (serverless-parameters plugin; values from env via provider.stackParameters)
  parameters:
    CloudFrontAlias:
      Type: String
      Default: ''
      Description: Custom domain alias for CloudFront (e.g. beta.casfa.shazhou.me)
    AcmCertArn:
      Type: String
      Default: ''
      Description: ACM certificate ARN (must be in us-east-1 for CloudFront)
  serverless-offline:
    httpPort: 7101
    lambdaPort: 7103
    noPrependStageInUrl: true
  # DynamoDB Local (serverless-dynamodb = maintained fork; fixes 403 on install)
  serverless-dynamodb:
    stages:
      - dev
      - local-test
    start:
      port: 7102
      migrate: true
      # inMemory: true = 每次启动全新 DB，避免文件锁/损坏导致频繁重启；需要保留数据时改为 false 并用 dbPath
      inMemory: true
      # inMemory: false 时取消下面注释以持久化（可能遇到文件锁或异常退出后需 clean:db + 重启）
      # inMemory: false
      # dbPath: ".dynamodb"
      # If Java install fails with NoClassDefFoundError (e.g. ParseException), use Docker instead:
      # docker: true
  s3:
    host: localhost
    port: 4569
    directory: .local-storage/s3
  esbuild:
    bundle: true
    target: node20
    format: cjs
    outExtension:
      ".js": ".cjs"
    sourcemap: true
    packagePath: ./package.json

functions:
  api:
    handler: backend/lambda.handler
    timeout: 30
    events:
      - httpApi: '*'

# Frontend: S3 bucket + CloudFront (SPA; /api -> API Gateway)
# Custom domain: set CLOUDFRONT_ALIAS and ACM_CERTIFICATE_ARN when deploying beta/prod (see deploy script and .env.example).
# Parameters are added by serverless-parameters plugin from custom.parameters.
resources:
  Conditions:
    UseCustomDomain: !Not [!Equals [!Ref CloudFrontAlias, '']]
  Resources:
    # DynamoDB: delegates + roots (realm/branch state)
    DelegatesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: casfa-next-${sls:stage}-delegates
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: pk
            AttributeType: S
          - AttributeName: sk
            AttributeType: S
          - AttributeName: gsi1pk
            AttributeType: S
          - AttributeName: gsi1sk
            AttributeType: S
        KeySchema:
          - AttributeName: pk
            KeyType: HASH
          - AttributeName: sk
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: realm-index
            KeySchema:
              - AttributeName: gsi1pk
                KeyType: HASH
              - AttributeName: gsi1sk
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
    # DynamoDB: delegate grants (access token auth)
    DelegateGrantsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: casfa-next-${sls:stage}-grants
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: pk
            AttributeType: S
          - AttributeName: sk
            AttributeType: S
          - AttributeName: gsi1pk
            AttributeType: S
          - AttributeName: gsi1sk
            AttributeType: S
          - AttributeName: gsi2pk
            AttributeType: S
          - AttributeName: gsi2sk
            AttributeType: S
        KeySchema:
          - AttributeName: pk
            KeyType: HASH
          - AttributeName: sk
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: realm-hash-index
            KeySchema:
              - AttributeName: gsi1pk
                KeyType: HASH
              - AttributeName: gsi1sk
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: realm-refresh-index
            KeySchema:
              - AttributeName: gsi2pk
                KeyType: HASH
              - AttributeName: gsi2sk
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
    # S3 bucket for CAS blob (used by serverless-s3-local locally)
    BlobBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: casfa-next-${sls:stage}-blob
    FrontendBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: casfa-next-frontend-${sls:stage}
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true
    FrontendOAC:
      Type: AWS::CloudFront::OriginAccessControl
      Properties:
        OriginAccessControlConfig:
          Name: casfa-next-frontend-oac-${sls:stage}
          OriginAccessControlOriginType: s3
          SigningBehavior: always
          SigningProtocol: sigv4
    # Cache policy for /api/*: forward Authorization to origin (required for Bearer JWT); minimal TTL so API is not cached.
    ApiCachePolicy:
      Type: AWS::CloudFront::CachePolicy
      Properties:
        CachePolicyConfig:
          Name: casfa-next-api-cache-${sls:stage}
          Comment: Forward Authorization header to API Gateway; cache key includes Authorization so per-user
          DefaultTTL: 1
          MaxTTL: 1
          MinTTL: 0
          ParametersInCacheKeyAndForwardedToOrigin:
            EnableAcceptEncodingGzip: true
            HeadersConfig:
              HeaderBehavior: whitelist
              Headers:
                - Authorization
            CookiesConfig:
              CookieBehavior: none
            QueryStringsConfig:
              QueryStringBehavior: all
    FrontendCloudFront:
      Type: AWS::CloudFront::Distribution
      DependsOn: SpaFallbackEdgeVersion
      Properties:
        DistributionConfig:
          Enabled: true
          DefaultRootObject: index.html
          Origins:
            - Id: S3Frontend
              DomainName: !GetAtt FrontendBucket.RegionalDomainName
              OriginAccessControlId: !GetAtt FrontendOAC.Id
              S3OriginConfig:
                OriginAccessIdentity: ""
            - Id: ApiGateway
              DomainName: !Sub ${HttpApi}.execute-api.${AWS::Region}.amazonaws.com
              CustomOriginConfig:
                HTTPSPort: 443
                OriginProtocolPolicy: https-only
          DefaultCacheBehavior:
            TargetOriginId: S3Frontend
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            Compress: true
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
            LambdaFunctionAssociations:
              - EventType: origin-response
                LambdaFunctionARN: !Ref SpaFallbackEdgeVersion
          CacheBehaviors:
            - PathPattern: /api/*
              TargetOriginId: ApiGateway
              ViewerProtocolPolicy: https-only
              AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
              Compress: true
              CachePolicyId: !Ref ApiCachePolicy
              LambdaFunctionAssociations:
                - EventType: origin-response
                  LambdaFunctionARN: !Ref SpaFallbackEdgeVersion
          Aliases: !If [UseCustomDomain, [!Ref CloudFrontAlias], !Ref AWS::NoValue]
          ViewerCertificate: !If
            - UseCustomDomain
            - AcmCertificateArn: !Ref AcmCertArn
              SslSupportMethod: sni-only
              MinimumProtocolVersion: TLSv1.2_2021
            - CloudFrontDefaultCertificate: true
          # No CustomErrorResponses: API 403/404 must return JSON. SPA fallback via SpaFallbackEdge (origin-response).
    SpaFallbackEdgeRole:
      Type: AWS::IAM::Role
      Properties:
        AssumeRolePolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal: { Service: lambda.amazonaws.com }
              Action: sts:AssumeRole
            - Effect: Allow
              Principal: { Service: edgelambda.amazonaws.com }
              Action: sts:AssumeRole
    SpaFallbackEdgeRolePolicy:
      Type: AWS::IAM::Policy
      Properties:
        PolicyName: SpaFallbackEdgeS3
        Roles: [!Ref SpaFallbackEdgeRole]
        PolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action: s3:GetObject
              Resource: !Sub ${FrontendBucket.Arn}/index.html
    SpaFallbackEdgeFunction:
      Type: AWS::Lambda::Function
      Properties:
        FunctionName: casfa-next-spa-fallback-edge-${sls:stage}
        Runtime: nodejs18.x
        Handler: index.handler
        Code:
          ZipFile: |
            const AWS = require('aws-sdk');
            function parse(d) {
              if (!d || typeof d !== 'string') return null;
              const p = d.toLowerCase().split('.');
              if (p.length >= 4 && p[1] === 's3') return { bucket: p[0], region: p[2] || 'us-east-1' };
              return null;
            }
            exports.handler = async (event) => {
              const r = event.Records && event.Records[0] && event.Records[0].cf;
              if (!r) return event;
              const req = r.request;
              const res = r.response;
              const status = parseInt(res.status, 10);
              if (status !== 403 && status !== 404) return event;
              if (req.uri.startsWith('/api')) return event;
              const o = parse(req.origin && req.origin.s3 && req.origin.s3.domainName);
              if (!o) return event;
              const s3 = new AWS.S3({ region: o.region });
              try {
                const out = await s3.getObject({ Bucket: o.bucket, Key: 'index.html' }).promise();
                const body = out.Body.toString('utf-8');
                const b64 = Buffer.from(body, 'utf-8').toString('base64');
                res.status = '200';
                res.statusDescription = 'OK';
                res.body = b64;
                res.bodyEncoding = 'base64';
                res.headers['content-type'] = [{ key: 'Content-Type', value: 'text/html; charset=utf-8' }];
                res.headers['content-length'] = [{ key: 'Content-Length', value: String(Buffer.byteLength(body, 'utf-8')) }];
              } catch (e) {}
              return event;
            };
        Role: !GetAtt SpaFallbackEdgeRole.Arn
        MemorySize: 128
        Timeout: 5
    SpaFallbackEdgeVersion:
      Type: AWS::Lambda::Version
      DependsOn: SpaFallbackEdgeFunction
      Properties:
        FunctionName: !Ref SpaFallbackEdgeFunction
    FrontendBucketPolicy:
      Type: AWS::S3::BucketPolicy
      DependsOn: FrontendCloudFront
      Properties:
        Bucket: !Ref FrontendBucket
        PolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Sid: AllowCloudFrontOAC
              Effect: Allow
              Principal:
                Service: cloudfront.amazonaws.com
              Action: s3:GetObject
              Resource: !Sub ${FrontendBucket.Arn}/*
              Condition:
                StringEquals:
                  AWS:SourceArn: !Sub arn:aws:cloudfront:${AWS::AccountId}:distribution/${FrontendCloudFront}
  Outputs:
    FrontendUrl:
      Description: CloudFront URL for frontend
      Value: !Sub https://${FrontendCloudFront.DomainName}
    FrontendBucketName:
      Description: S3 bucket for frontend assets
      Value: !Ref FrontendBucket
    FrontendDistributionId:
      Description: CloudFront distribution ID (for cache invalidation)
      Value: !Ref FrontendCloudFront
