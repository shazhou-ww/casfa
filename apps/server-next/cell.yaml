name: casfa-next
bucketNameSuffix: casfa-shazhou-me

backend:
  dir: backend
  runtime: nodejs20.x
  entries:
    api:
      handler: lambda.ts
      app: dev-app.ts
      timeout: 30
      memory: 1024
      routes:
        - /api/*
        - /oauth/login
        - /oauth/logout
        - /oauth/register
        - /oauth/client-info
        - /oauth/token
        - /.well-known/*
        - /mcp

frontend:
  dir: frontend
  entries:
    main:
      entry: index.html
      routes: ["/*"]

tables:
  realms:
    keys: { pk: S, sk: S }
    gsi:
      realm-index:
        keys: { gsi1pk: S, gsi1sk: S }
        projection: ALL
  grants:
    keys: { pk: S, sk: S }
    gsi:
      user-hash-index:
        keys: { gsi1pk: S, gsi1sk: S }
        projection: ALL
      user-refresh-index:
        keys: { gsi2pk: S, gsi2sk: S }
        projection: ALL
  # Stub OAuth client_name from dynamic registration; set item attribute "ttl" (epoch seconds) for AWS DynamoDB TTL (enable on table in AWS).
  pending_client_info:
    keys: { pk: S }

buckets:
  blob: {}

# App reads config from params (env). SSO: only REGION + USER_POOL_ID needed for JWT (rest on SSO cell).
# Cognito and domain config come from .env (root or cell-level) for easy instance switching.
params:
  COGNITO_REGION: !Env
  COGNITO_USER_POOL_ID: !Env
  MAX_BRANCH_TTL_MS: "86400000"
  DOMAIN_ZONE: !Env
  DOMAIN_HOST: !Env
  LOG_LEVEL: !Env
  SSO_BASE_URL: !Env

domains:
  - zone: !Param DOMAIN_ZONE
    host: !Param DOMAIN_HOST

testing:
  unit: backend/
