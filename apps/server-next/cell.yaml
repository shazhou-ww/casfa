name: casfa-next
bucketNameSuffix: casfa-shazhou-me

backend:
  dir: backend
  runtime: nodejs20.x
  entries:
    api:
      handler: lambda.ts
      app: dev-app.ts
      timeout: 30
      memory: 1024
      routes:
        - /api/*
        - /oauth/login
        - /oauth/logout
        - /oauth/register
        - /oauth/client-info
        - /oauth/token
        - /.well-known/*
        - /mcp

frontend:
  dir: frontend
  entries:
    main:
      entry: index.html
      routes: ["/*"]

tables:
  realms:
    keys: { pk: S, sk: S }
    gsi:
      realm-index:
        keys: { gsi1pk: S, gsi1sk: S }
        projection: ALL
  grants:
    keys: { pk: S, sk: S }
    gsi:
      user-hash-index:
        keys: { gsi1pk: S, gsi1sk: S }
        projection: ALL
      user-refresh-index:
        keys: { gsi2pk: S, gsi2sk: S }
        projection: ALL
  # Stub OAuth client_name from dynamic registration; set item attribute "ttl" (epoch seconds) for AWS DynamoDB TTL (enable on table in AWS).
  pending_client_info:
    keys: { pk: S }

buckets:
  blob: {}

# Default instance: casfa.shazhou.me (Route53). Symbiont: cell.symbiont.yaml.
params:
  COGNITO_REGION: "us-east-1"
  COGNITO_USER_POOL_ID: "us-east-1_gMTKxXOKo"
  MAX_BRANCH_TTL_MS: "86400000"
  DOMAIN_ROOT: "shazhou.me"
  DNS:
    provider: route53
    zone: "casfa.shazhou.me"
  LOG_LEVEL: "info"
  SSO_BASE_URL: !Env SSO_BASE_URL

dev:
  portBase: 7120

domain:
  subdomain: drive.casfa
  dns: !Param DNS

testing:
  unit: backend/
