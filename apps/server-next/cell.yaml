name: casfa-next

backend:
  runtime: nodejs20.x
  entries:
    api:
      handler: backend/lambda.ts
      app: backend/dev-app.ts
      timeout: 30
      memory: 1024
      routes:
        - /api/*
        - /oauth/authorize
        - /oauth/login
        - /oauth/token
        - /oauth/register
        - /oauth/callback
        - /oauth/consent-info
        - /oauth/approve
        - /oauth/deny
        - /oauth/logout
        - /.well-known/*
        - /mcp

frontend:
  dir: frontend
  entries:
    main:
      src: src/main.tsx

tables:
  realms:
    keys: { pk: S, sk: S }
    gsi:
      realm-index:
        keys: { gsi1pk: S, gsi1sk: S }
        projection: ALL
  grants:
    keys: { pk: S, sk: S }
    gsi:
      user-hash-index:
        keys: { gsi1pk: S, gsi1sk: S }
        projection: ALL
      user-refresh-index:
        keys: { gsi2pk: S, gsi2sk: S }
        projection: ALL

buckets:
  blob: {}

# App reads all config from params (env). When using SSO, only COGNITO_REGION and
# COGNITO_USER_POOL_ID are required. No cognito block: SSO cell owns OAuth callback;
# cell-cli does not need to sync this cell's URL to Cognito.
params:
  COGNITO_REGION: !Env
  COGNITO_USER_POOL_ID: !Env
  MAX_BRANCH_TTL_MS: !Env
  LOG_LEVEL: !Env
  SSO_BASE_URL: !Env

domain:
  zone: shazhou.me
  host: beta.casfa.shazhou.me
