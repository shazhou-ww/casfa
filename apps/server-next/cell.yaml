name: casfa-next

backend:
  dir: backend
  runtime: nodejs20.x
  entries:
    api:
      handler: lambda.ts
      app: dev-app.ts
      timeout: 30
      memory: 1024
      routes:
        - /api/*
        - /oauth/login
        - /oauth/logout
        - /oauth/register
        - /oauth/client-info
        - /oauth/token
        - /.well-known/*
        - /mcp

frontend:
  dir: frontend
  entries:
    main:
      entry: index.html
      routes: ["/*"]

tables:
  realms:
    keys: { pk: S, sk: S }
    gsi:
      realm-index:
        keys: { gsi1pk: S, gsi1sk: S }
        projection: ALL
  grants:
    keys: { pk: S, sk: S }
    gsi:
      user-hash-index:
        keys: { gsi1pk: S, gsi1sk: S }
        projection: ALL
      user-refresh-index:
        keys: { gsi2pk: S, gsi2sk: S }
        projection: ALL
  # Stub OAuth client_name from dynamic registration; set item attribute "ttl" (epoch seconds) for AWS DynamoDB TTL (enable on table in AWS).
  pending_client_info:
    keys: { pk: S }

buckets:
  blob: {}

# App reads config from params (env). SSO: only REGION + USER_POOL_ID needed for JWT (rest on SSO cell).
# Per docs/cell-config-rules: literal = non-secret & same local/prod; !Env = secret or env-specific.
params:
  COGNITO_REGION: "us-east-1"
  COGNITO_USER_POOL_ID: "us-east-1_gMTKxXOKo"
  MAX_BRANCH_TTL_MS: "86400000"
  LOG_LEVEL: !Env
  SSO_BASE_URL: !Env

domain:
  zone: shazhou.me
  host: beta.casfa.shazhou.me

testing:
  unit: backend/
